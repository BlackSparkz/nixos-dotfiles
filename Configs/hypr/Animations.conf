animations {
    enabled = true

    # Animation curves
    bezier = hobbyist, 0.34, 1.56, 0.64, 1
    bezier = alien, 0.9, 0, 0.20, 1.4
    bezier = cat, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    # Animation configs
    animation = windows, 1, 3, hobbyist, popin 80%
    animation = windowsIn, 1, 3, hobbyist, popin 80%
    animation = windowsOut, 1, 3, hobbyist, popin 80%
    animation = border, 1, 6, default
    animation = fade, 1, 1.2, hobbyist
    animation = layers, 1, 2, hobbyist, slide
    animation = layersIn, 1, 3, hobbyist, slide
    animation = layersOut, 1, 1.2, cat
    animation = fadeLayersIn, 1, 2, hobbyist
    animation = fadeLayersOut, 1, 3, cat
    animation = workspaces, 1, 4, alien, slidevert
    # animation = workspaces, 1, 6, alien, slidefadevert 20%
    animation = specialWorkspace, 1, 3, hobbyist, slidefadevert 20%
}
