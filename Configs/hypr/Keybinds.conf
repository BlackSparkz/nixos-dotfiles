bind = SUPER, space, exec, pkill rofi || rofi -show drun -theme ~/.config/rofi/launchpad.rasi

bind = SUPER, T, exec, kitty
bind = SUPER, A, exec, alacritty
bind = SUPER, B, exec, librewolf
bind = SUPER, Z, exec, localsend_app
bind = SUPER, M, exec, telegram-desktop
bind = SUPER, E, exec, kitty -e bluetui
bind = SUPER, Y, exec, kitty -e nmtui
bind = SUPER, X, exec, kitty -e cmus
bind = SUPER, N, exec, kitty -e yazi
bind = SUPER, W, exec, bash $HOME/.config/Scripts/random_wall_on_home.sh
bind = SUPER, R, exec, pkill waybar || waybar -c $HOME/.config/waybar/GlassFlow/config.jsonc -s $HOME/.config/waybar/GlassFlow/style.css ; hyprctl reload &
# bind = SUPER, R, exec, pkill waybar || waybar -c $HOME/.config/waybar/DropBar/config.jsonc -s $HOME/.config/waybar/DropBar/style.css ; hyprctl reload &

bind = SUPER, Q, killactive,
bind = SUPER, V, togglefloating,
bind = SUPER, F, fullscreen, 1
bind = SUPER, P, exec, pkill wlogout || wlogout
bind = SUPER, C, exec,pkill rofi ||cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy

bind = SUPER CTRL, F, fullscreen,
bind = SUPER CTRL, M, fullscreen, 0
bind = SUPER CTRL, T, exec, alacritty
bind = SUPER CTRL, B, exec, librewolf
bind = SUPER CTRL, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindl = SUPER CTRL, R, exec, bash ~/.config/Scripts/partial_screenshot.sh
bindl = SUPER CTRL, S, exec, bash ~/.config/Scripts/full_screenshot.sh

bind = ALT, L, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh
bindl = ALT, O, exec, systemctl poweroff
bindl = ALT, R, exec, systemctl reboot
bindl = ALT, S, exec, systemctl suspend ; bash ~/.config/Scripts/random_wall_on_lockscr.sh
bindel = ALT,B, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ALT,V, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ALT,X, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ALT,C, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ALT,M, exec, brightnessctl set 10%+
bindel = ALT,N, exec, brightnessctl set 10%-

bind = SUPER, left, movefocus, l
bind = SUPER, H, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, L, movefocus, r
bind = SUPER, up, workspace, e-1
bind = SUPER, down, workspace, e+1
bind = SUPER, U, workspace, e-1
bind = SUPER, I, workspace, e+1
bind = SUPER, J, workspace, e-1
bind = SUPER, K, workspace, e+1

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = SUPER SHIFT, right, layoutmsg, swapcol r
bind = SUPER SHIFT, left, layoutmsg, swapcol l

bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma, layoutmsg, move -col

bind = ALT, space, togglespecialworkspace, magic
bind = SUPER SHIFT, space, movetoworkspace, special:magic

bind = SUPER, mouse_up, workspace, e+1
bind = SUPER, mouse_down, workspace, e-1
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = ,XF86Lock, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
