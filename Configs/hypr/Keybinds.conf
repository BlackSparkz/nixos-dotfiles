$mainMod = SUPER

$terminal = kitty
$music = kitty -e cmus
$fileManager = kitty -e yazi
$menu = pkill rofi || rofi -show drun -theme ~/.config/rofi/launchpad.rasi
$browser = librewolf
$alt_browser = librewolf

bind = $mainMod, T, exec, $terminal
bind = $mainMod CTRL, T, exec, alacritty
bind = $mainMod, X, exec, $music
bind = $mainMod, R, exec, pkill waybar || waybar -c $HOME/.config/waybar/Hyprland/config.jsonc -s $HOME/.config/waybar/style.css &
bind = $mainMod, Q, killactive,
bind = $mainMod, P, exec, pkill wlogout || wlogout
bindl = $mainMod CTRL, R, exec, bash ~/.config/Scripts/partial_screenshot.sh
bindl = $mainMod CTRL, S, exec, bash ~/.config/Scripts/full_screenshot.sh
bind = $mainMod, W, exec, bash $HOME/.config/Scripts/random_wall_on_home.sh
bind = $mainMod, B, exec, $browser
bind = $mainMod, Z, exec, localsend_app
bind = $mainMod, N, exec, telegram-desktop
bind = $mainMod CTRL, B, exec, $alt_browser
bind = $mainMod CTRL, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, C, exec,pkill rofi ||cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = $mainMod, N, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreen,
bind = $mainMod ALT, O, exec, systemctl poweroff
bind = $mainMod ALT, R, exec, systemctl reboot
bind = $mainMod ALT, S, exec, systemctl suspend ; bash ~/.config/Scripts/random_wall_on_lockscr.sh
bind = $mainMod ALT, L, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh
bind = $mainMod CTRL, M, fullscreen, 0
bind = $mainMod, space, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, workspace, e-1
bind = $mainMod, down, workspace, e+1
# bind = $mainMod, down, workspace, empty

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86Lock, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
