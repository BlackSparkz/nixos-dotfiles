[general]
live_config_reload = true

[window]
dimensions = { columns = 160, lines = 44 }
padding = { x = 28, y = 24 }
decorations = "none"
dynamic_padding = true

[font]
size = 12.0

[font.normal]
#family = "Google Sans Code NF"
# style = "Regular"
family = "ProFont IIx Nerd Font Mono"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "beam", blinking = "off" }
thickness = 0.15

[keyboard]
bindings = [
{ key = "V", mods = "Control", action = "Paste" },
#{ key = "C", mods = "Control", action = "Copy" },
]

[colors.primary]
background = "#000000"
foreground = "#d4d4d4"

[colors.cursor]
text = "#1e1e1e"
cursor = "#ffffff"

[colors.normal]
black = "#000000"#"#2e3436"
red = "#cc0000"
green = "#4e9a06"
yellow = "#c4a000"
blue = "#3465a4"
magenta = "#75507b"
cyan = "#06989a"
white = "#d3d7cf"

[colors.bright]
black = "#000000"
red = "#ef2929"
green = "#00ff00"
yellow = "#fce94f"
blue = "#729fcf"
magenta = "#ad7fa8"
cyan = "#34e2e2"
white = "#eeeeec"
